<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Micky AI</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#060a16">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="micky-ai-icon-512.png">

    <style>
        :root {
            --bg: #060a16;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #7c6fff;
            --primary-gradient: linear-gradient(135deg, #7c6fff, #5b4aff);
            --accent: #00f5c4;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* ANIMATED MESH BACKGROUND */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: -10%; left: -10%;
            width: 400px; height: 400px;
            background: rgba(124, 111, 255, 0.2);
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            animation: float 15s infinite alternate ease-in-out;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -10%; right: -10%;
            width: 350px; height: 350px;
            background: rgba(0, 245, 196, 0.15);
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            animation: float 12s infinite alternate-reverse ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, -50px) scale(1.1); }
        }

        /* APP CONTAINER */
        .app {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            background: rgba(6, 10, 22, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
            position: relative;
        }

        /* CHAT AREA */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: none;
        }
        #chat::-webkit-scrollbar { display: none; }

        /* BUBBLE DESIGN */
        .msg {
            padding: 12px 16px;
            font-size: 0.95rem;
            line-height: 1.4;
            max-width: 85%;
            position: relative;
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .user {
            background: var(--primary-gradient);
            color: white;
            align-self: flex-end;
            border-radius: 18px 18px 4px 18px;
            box-shadow: 0 4px 15px rgba(124, 111, 255, 0.3);
        }

        .ai {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            align-self: flex-start;
            border-radius: 18px 18px 18px 4px;
        }

        @keyframes pop {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* TYPING INDICATOR */
        .typing {
            display: none;
            padding: 12px 16px;
            background: var(--glass);
            border-radius: 18px 18px 18px 4px;
            width: fit-content;
            margin-bottom: 10px;
        }

        .dots { display: flex; gap: 4px; }
        .dots span {
            width: 6px; height: 6px;
            background: #8b9bb4;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* INPUT AREA */
        .input-box {
            padding: 20px;
            background: rgba(6, 10, 22, 0.8);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 12px 20px;
            color: white;
            outline: none;
            font-size: 0.95rem;
        }

        button {
            background: var(--primary-gradient);
            border: none;
            width: 45px; height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(124, 111, 255, 0.4);
        }

        /* INSTALL BANNER */
        .banner {
            position: absolute; bottom: 85px; left: 15px; right: 15px;
            background: var(--primary);
            padding: 12px 18px;
            border-radius: 12px;
            display: none;
            justify-content: space-between; align-items: center;
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .banner p { font-size: 0.85rem; font-weight: bold; }
        .banner button { 
            background: white; color: var(--primary); 
            width: auto; height: auto; padding: 6px 12px; 
            border-radius: 6px; font-size: 0.75rem; 
        }
    </style>
</head>

<body>

<div class="app">
    <div id="chat"></div>

    <div id="typing" class="typing">
        <div class="dots"><span></span><span></span><span></span></div>
    </div>

    <div id="installBanner" class="banner">
        <p>Install Micky AI App?</p>
        <button onclick="installApp()">Install</button>
    </div>

    <div class="input-box">
        <input id="input" placeholder="Message Micky AI..." onkeydown="if(event.key==='Enter') send()">
        <button onclick="send()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script>
    const API_KEY = "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";
    const ENDPOINT = "https://api.groq.com/openai/v1/chat/completions";

    let chatLog = [
        {role: "system", content: "Your name is Micky AI. You were created by Michael Adigwe (Micky Fundz). Be helpful and cool."}
    ];

    function append(role, text) {
        const chat = document.getElementById("chat");
        const div = document.createElement("div");
        div.className = "msg " + role;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
    }

    async function send() {
        const input = document.getElementById("input");
        const text = input.value.trim();
        if(!text) return;

        append("user", text);
        input.value = "";
        chatLog.push({role: "user", content: text});

        document.getElementById("typing").style.display = "block";

        try {
            const res = await fetch(ENDPOINT, {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + API_KEY,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: chatLog
                })
            });

            const data = await res.json();
            const reply = data.choices[0].message.content;

            document.getElementById("typing").style.display = "none";
            chatLog.push({role: "assistant", content: reply});
            append("ai", reply);

        } catch(e) {
            document.getElementById("typing").style.display = "none";
            append("ai", "I'm having trouble connecting to my brain. Try again later!");
        }
    }

    // --- PWA INSTALL LOGIC ---
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        setTimeout(() => {
            if (!window.matchMedia('(display-mode: standalone)').matches) {
                document.getElementById('installBanner').style.display = 'flex';
            }
        }, 5000); // Show after 5 seconds
    });

    async function installApp() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('installBanner').style.display = 'none';
            deferredPrompt = null;
        }
    }

    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
    }

    // Welcome Message
    window.onload = () => {
        setTimeout(() => append("ai", "Micky AI is active. How can I help you today?"), 500);
    };
</script>

</body>
</html>
