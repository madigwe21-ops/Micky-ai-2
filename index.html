<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Micky AI</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#060a16">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="micky-ai-icon-512.png">

    <style>
        :root {
            --bg: #060a16;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #7c6fff;
            --primary-gradient: linear-gradient(135deg, #7c6fff, #5b4aff);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* THE ULTIMATE LOCKDOWN FOR MOBILE */
        html, body {
            position: fixed; /* Physically pins the page to the screen */
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* Supports modern mobile browsers */
            overflow: hidden; /* Kills all background scrolling */
            overscroll-behavior: none; /* Stops the pull-to-refresh bounce effect! */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
        }

        /* ANIMATED BACKGROUND GLOWS */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 15s infinite alternate ease-in-out;
        }
        body::before { top: -5%; left: -5%; width: 300px; height: 300px; background: rgba(124, 111, 255, 0.15); }
        body::after { bottom: -5%; right: -5%; width: 250px; height: 250px; background: rgba(0, 245, 196, 0.1); animation-delay: -2s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -30px) scale(1.1); }
        }

        /* APP CONTAINER - Locked to exact dimensions */
        .app {
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            margin: auto;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            background: rgba(6, 10, 22, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
        }

        /* 100% LOCKED HEADER */
        header {
            flex: 0 0 auto; 
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--glass-border);
            text-align: center;
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 2px;
            z-index: 10;
        }

        /* THE ONLY THING THAT SCROLLS */
        #chat {
            flex: 1 1 0; 
            overflow-y: auto; 
            overscroll-behavior-y: contain; /* Traps scroll physics inside this box */
            -webkit-overflow-scrolling: touch; /* Smooth iOS scrolling */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: none; 
        }
        #chat::-webkit-scrollbar { display: none; }

        /* BUBBLES */
        .msg {
            padding: 12px 16px;
            font-size: 0.95rem;
            line-height: 1.4;
            max-width: 85%;
            animation: slideUp 0.3s ease-out;
            word-wrap: break-word;
        }

        .user {
            background: var(--primary-gradient);
            align-self: flex-end;
            border-radius: 18px 18px 4px 18px;
            box-shadow: 0 4px 15px rgba(124, 111, 255, 0.2);
        }

        .ai {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            align-self: flex-start;
            border-radius: 18px 18px 18px 4px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* TYPING INDICATOR */
        #typing-indicator { 
            display: none; 
            width: fit-content;
        }
        .dots { display: flex; gap: 4px; align-items: center; height: 10px; }
        .dots span { width: 6px; height: 6px; background: #8b9bb4; border-radius: 50%; animation: bounce 1.4s infinite; }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* 100% LOCKED INPUT AREA */
        .input-box {
            flex: 0 0 auto; 
            padding: 15px 15px 30px 15px; /* Extra bottom padding to avoid iPhone home bar */
            background: rgba(6, 10, 22, 0.9);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        input {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px 18px;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        button {
            background: var(--primary-gradient);
            border: none;
            width: 48px; height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px rgba(124, 111, 255, 0.3);
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="app">
    <header>MICKY AI</header>
    
    <div id="chat">
        <div class="msg ai">Hello! Micky AI is ready. How can I help you today?</div>
        
        <div id="typing-indicator" class="msg ai">
            <div class="dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    <div class="input-box">
        <input id="input" placeholder="Type a message..." autocomplete="off" onkeydown="if(event.key==='Enter') send()">
        <button onclick="send()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script>
    const API_KEY = "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";
    const ENDPOINT = "https://api.groq.com/openai/v1/chat/completions";

    let chatLog = [
        {role: "system", content: "Your name is Micky AI, created by Michael Adigwe."}
    ];

    function append(role, text) {
        const chatArea = document.getElementById("chat");
        const typingIndicator = document.getElementById("typing-indicator");
        
        const div = document.createElement("div");
        div.className = "msg " + role;
        div.innerText = text;
        
        chatArea.insertBefore(div, typingIndicator);
        chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
    }

    async function send() {
        const input = document.getElementById("input");
        const text = input.value.trim();
        if(!text) return;

        append("user", text);
        input.value = "";
        
        // Remove focus from the input so keyboard hides on mobile (optional, but helps stability)
        // input.blur(); 

        chatLog.push({role: "user", content: text});

        const typingIndicator = document.getElementById("typing-indicator");
        const chatArea = document.getElementById("chat");
        
        typingIndicator.style.display = "block";
        chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });

        try {
            const res = await fetch(ENDPOINT, {
                method: "POST",
                headers: { "Authorization": "Bearer " + API_KEY, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chatLog })
            });

            const data = await res.json();
            const reply = data.choices[0].message.content;

            typingIndicator.style.display = "none";
            chatLog.push({role: "assistant", content: reply});
            append("ai", reply);

        } catch(e) {
            typingIndicator.style.display = "none";
            append("ai", "Sorry, I lost my connection!");
        }
    }

    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
    }
</script>

</body>
</html>
